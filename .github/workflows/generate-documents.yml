name: Generate WS Documents

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - '.github/workflows/generate-documents.yml'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install reportlab

      - name: Generate all documents
        run: |
          mkdir -p artifacts
          python docs/generate_all.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ws-documents
          path: artifacts/
          retention-days: 90